<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 2026 Live Standings Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>F1 2026 CHAMPIONSHIP TRACKER</h1>
        <div id="status">Syncing with FIA Data...</div>
    </header>

    <main class="container">
        <section class="track-wrapper">
            <h2>DRIVERS</h2>
            <div id="driver-track" class="track">
                <div class="line finish">P1: Russell (51)</div>
                <div id="drivers-layer"></div>
                <div class="line start">0 PTS</div>
            </div>
        </section>

        <section class="track-wrapper">
            <h2>CONSTRUCTORS</h2>
            <div id="constructor-track" class="track">
                <div class="line finish">P1: Mercedes (98)</div>
                <div id="constructors-layer"></div>
                <div class="line start">0 PTS</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
